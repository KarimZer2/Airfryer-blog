name: Publication quotidienne d'un article

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install anthropic jinja2 markdown

      - name: Générer le nouvel article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_article.py
        continue-on-error: true

      - name: Construire le site
        run: python build.py

      - name: Committer le nouvel article et le topics.json mis à jour
        run: |
          git config user.name "airfryer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/ config/topics.json
          git commit -m "Nouvel article automatique du $(date +'%Y-%m-%d')" || echo "Rien à committer"
          git push

      - name: Préparer le déploiement GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
